name: Tag Version on Merge to Main

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Read package version
      id: version
      run: |
        version=$(grep -oP '^__version__\s*=\s*"\K[^"]+' \
          printify_client/__init__.py)
        if [ -z "$version" ]; then
          echo "Could not parse __version__" >&2
          exit 1
        fi
        echo "tag=${version}" >> "$GITHUB_OUTPUT"

    - name: Check whether this version is already tagged
      id: check
      env:
        TAG: ${{ steps.version.outputs.tag }}
      run: |
        if git ls-remote --exit-code --tags origin \
          "refs/tags/$TAG" >/dev/null 2>&1; then
          echo "is_new=false" >> "$GITHUB_OUTPUT"
        else
          echo "is_new=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or overwrite tag
      env:
        TAG: ${{ steps.version.outputs.tag }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f "$TAG" "$GITHUB_SHA"
        git push -f origin "refs/tags/$TAG"

    - name: Publish new version to PyPI
      if: steps.check.outputs.is_new == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ steps.version.outputs.tag }}
      run: |
        gh workflow run publish.yml --ref "$TAG"
